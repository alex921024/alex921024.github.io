<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網路安全攻擊模擬器 | Yang Jinfong</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #10b981;
            --danger: #ef4444;
            --dark: #0f172a;
            --terminal-bg: #000000;
            --terminal-text: #00ff00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--dark); color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; }

        /* 頂部導航 */
        nav { background: rgba(15, 23, 42, 0.9); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .back-link { color: #fff; text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .back-link:hover { color: var(--primary); }
        .nav-title { font-weight: 700; font-size: 1.2rem; color: #fff; }

        /* 主佈局 */
        .simulator-container { flex: 1; padding: 30px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; }

        /* 左側：動畫視圖與控制面板 */
        .left-panel { display: flex; flex-direction: column; gap: 20px; }
        
        .control-panel { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; }
        .control-panel h3 { margin-bottom: 15px; color: var(--primary); }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: 'Noto Sans TC', sans-serif; }
        .btn-attack { background: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid var(--primary); }
        .btn-attack:hover { background: var(--primary); color: #fff; }
        .btn-attack.active { background: var(--danger); border-color: var(--danger); color: #fff; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
        .btn-stop { background: transparent; color: #aaa; border: 1px solid #555; }
        .btn-stop:hover { background: #333; color: #fff; }

        /* 動畫畫布區 */
        .canvas-container { flex: 1; background: #0a0a0a; border: 1px solid #333; border-radius: 12px; position: relative; overflow: hidden; min-height: 400px; display: flex; align-items: center; justify-content: center; }
        
        .node { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10; }
        .node-icon { font-size: 2.5rem; background: rgba(0,0,0,0.8); width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid; }
        .node-label { font-weight: bold; font-family: 'Fira Code', monospace; font-size: 0.9rem; }
        
        #node-attacker { left: 10%; color: var(--danger); }
        #node-attacker .node-icon { border-color: var(--danger); box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
        
        #node-target { right: 10%; color: var(--accent); }
        #node-target .node-icon { border-color: var(--accent); box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        #node-target.under-attack .node-icon { border-color: var(--danger); animation: shake 0.5s infinite; color: var(--danger); }

        #node-dns { left: 45%; top: 15%; color: var(--primary); display: none; }
        #node-dns .node-icon { border-color: var(--primary); font-size: 1.8rem; width: 60px; height: 60px; }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* 封包動畫元素 */
        .packet { position: absolute; width: 12px; height: 12px; border-radius: 50%; background: #fff; z-index: 5; transition: all linear; opacity: 0; }
        .packet.syn { background: #fbbf24; box-shadow: 0 0 10px #fbbf24; }
        .packet.ddos { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        .packet.dns-req { background: #93c5fd; width: 8px; height: 8px; }
        .packet.dns-res { background: var(--danger); width: 20px; height: 20px; box-shadow: 0 0 15px var(--danger); border-radius: 4px; }

        /* 右側：終端機 UI */
        .right-panel { display: flex; flex-direction: column; }
        .terminal-window { 
            background: var(--terminal-bg); 
            border: 1px solid #333; 
            border-radius: 8px; 
            height: 580px; /* 固定高度，讓對話框不無限變大 */
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8); 
        }
        .terminal-header { background: #222; padding: 8px 15px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #333; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; } .dot-yellow { background: #ffbd2e; } .dot-green { background: #27c93f; }
        .terminal-title { color: #888; font-family: sans-serif; font-size: 0.8rem; margin-left: auto; margin-right: auto; }
        
        .terminal-body { flex: 1; padding: 15px; overflow-y: auto; font-family: 'Fira Code', monospace; font-size: 0.85rem; color: var(--terminal-text); line-height: 1.6; }
        .log-line { margin-bottom: 4px; word-break: break-all; }
        .log-info { color: #3b82f6; }
        .log-warn { color: #fbbf24; }
        .log-danger { color: #ef4444; font-weight: bold; }
        
        /* 滾動條樣式 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #666; }

        @media (max-width: 900px) {
            .simulator-container { grid-template-columns: 1fr; }
            .terminal-window { height: 300px; flex: none; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> 回到作品集</a>
        <div class="nav-title">Cyber Security Simulator</div>
        <div style="width: 100px;"></div>
    </nav>

    <div class="simulator-container">
        <div class="left-panel">
            <div class="control-panel">
                <h3><i class="fas fa-shield-alt"></i> 攻擊模式控制台</h3>
                <div class="btn-group">
                    <button class="btn btn-attack" onclick="startAttack('syn', this)">SYN Flood (半開連線)</button>
                    <button class="btn btn-attack" onclick="startAttack('ddos', this)">DDoS (阻斷服務)</button>
                    <button class="btn btn-attack" onclick="startAttack('dns', this)">DNS Amplification</button>
                    <button class="btn btn-stop" onclick="stopAttack()">🛑 停止監聽</button>
                </div>
                <p id="attack-desc" style="margin-top: 15px; font-size: 0.9rem; color: #aaa; line-height: 1.5; min-height: 40px;">
                    請選擇上方攻擊模式以啟動封包監聽與視覺化模擬。
                </p>
            </div>

            <div class="canvas-container" id="canvas">
                <div id="node-attacker" class="node">
                    <div class="node-icon"><i class="fas fa-user-secret"></i></div>
                    <div class="node-label">Attacker<br>192.168.1.100</div>
                </div>

                <div id="node-dns" class="node">
                    <div class="node-icon"><i class="fas fa-server"></i></div>
                    <div class="node-label">DNS Server<br>8.8.8.8</div>
                </div>

                <div id="node-target" class="node">
                    <div class="node-icon"><i class="fas fa-globe"></i></div>
                    <div class="node-label">Target Server<br>10.0.0.50</div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="terminal-window">
                <div class="terminal-header">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-yellow"></div>
                    <div class="dot dot-green"></div>
                    <div class="terminal-title">root@stust-sec:~</div>
                </div>
                <div class="terminal-body" id="terminal">
                    <div class="log-line">STUST Network Security Engine v2.0 initialized.</div>
                    <div class="log-line">Listening on interface eth0...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const canvas = document.getElementById('canvas');
        const targetNode = document.getElementById('node-target');
        const dnsNode = document.getElementById('node-dns');
        const descText = document.getElementById('attack-desc');
        
        let attackInterval;
        let logInterval;
        let currentMode = null;

        const descriptions = {
            'syn': "<strong>SYN Flood：</strong>攻擊者發送大量偽造來源 IP 的 SYN 請求，伺服器回覆 SYN-ACK 並等待確認，導致伺服器連線資源 (TCP Backlog) 被耗盡。",
            'ddos': "<strong>DDoS (分散式阻斷服務)：</strong>透過大量殭屍網路直接向目標伺服器發送巨量流量，導致伺服器頻寬或運算資源癱瘓。",
            'dns': "<strong>DNS 放大攻擊：</strong>攻擊者偽造目標伺服器的 IP 向開放的 DNS 伺服器發送查詢請求，DNS 伺服器將龐大的回應封包傳給目標，造成流量放大。"
        };

        function addLog(message, type = '') {
            const time = new Date().toISOString().split('T')[1].slice(0, 8);
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            line.innerHTML = `<span style="color:#555">[${time}]</span> ${message}`;
            terminal.appendChild(line);
            // 讓終端機自動滾動到底部
            terminal.scrollTop = terminal.scrollHeight;
        }

        function createPacket(type, startNode, endNode, duration) {
            const packet = document.createElement('div');
            packet.className = `packet ${type}`;
            canvas.appendChild(packet);

            const startRect = startNode.getBoundingClientRect();
            const endRect = endNode.getBoundingClientRect();
            const canvasRect = canvas.getBoundingClientRect();

            const startX = startRect.left - canvasRect.left + startRect.width / 2;
            const startY = startRect.top - canvasRect.top + startRect.height / 2;
            const endX = endRect.left - canvasRect.left + endRect.width / 2;
            const endY = endRect.top - canvasRect.top + endRect.height / 2;

            // 加上一點隨機偏移讓封包看起來不那麼死板
            const offsetY = (Math.random() - 0.5) * 40;

            packet.style.left = `${startX}px`;
            packet.style.top = `${startY + offsetY}px`;
            packet.style.opacity = '1';

            // 觸發動畫
            requestAnimationFrame(() => {
                packet.style.transition = `all ${duration}ms linear`;
                packet.style.left = `${endX}px`;
                packet.style.top = `${endY + offsetY}px`;
            });

            // 動畫結束後移除
            setTimeout(() => {
                if (packet.parentNode) packet.parentNode.removeChild(packet);
            }, duration);
        }

        function startAttack(mode, btn) {
            stopAttack();
            currentMode = mode;
            descText.innerHTML = descriptions[mode];
            
            document.querySelectorAll('.btn-attack').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            targetNode.classList.add('under-attack');

            const attacker = document.getElementById('node-attacker');
            const target = document.getElementById('node-target');
            
            if (mode === 'dns') {
                dnsNode.style.display = 'flex';
                addLog('Detecting DNS Amplification signatures...', 'warn');
                
                attackInterval = setInterval(() => {
                    // 1. Attacker to DNS (Small Request)
                    createPacket('dns-req', attacker, dnsNode, 600);
                    
                    // 2. DNS to Target (Large Response)
                    setTimeout(() => {
                        createPacket('dns-res', dnsNode, target, 800);
                    }, 600);
                }, 400);

                logInterval = setInterval(() => {
                    const spoofedIP = `10.0.0.${Math.floor(Math.random() * 255)}`;
                    addLog(`DNS query ANY example.com from spoofed IP ${spoofedIP}`);
                    addLog(`Massive payload (4096 bytes) redirected to 10.0.0.50`, 'danger');
                }, 800);

            } else if (mode === 'syn') {
                dnsNode.style.display = 'none';
                addLog('TCP SYN Flood detected. Analyzing half-open connections...', 'warn');
                
                attackInterval = setInterval(() => {
                    createPacket('syn', attacker, target, 1000);
                }, 150);

                logInterval = setInterval(() => {
                    const fakeIP = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.1`;
                    const port = Math.floor(Math.random() * 60000) + 1024;
                    addLog(`[TCP] SYN Received from ${fakeIP}:${port} -> 10.0.0.50:80`);
                    addLog(`[WARN] TCP Backlog queue filling up...`, 'warn');
                }, 500);

            } else if (mode === 'ddos') {
                dnsNode.style.display = 'none';
                addLog('Volumetric DDoS attack initiated...', 'danger');
                
                attackInterval = setInterval(() => {
                    for(let i=0; i<3; i++) {
                        setTimeout(() => createPacket('ddos', attacker, target, 800), Math.random() * 200);
                    }
                }, 100);

                logInterval = setInterval(() => {
                    addLog(`[ALERT] Inbound traffic spike: ${(Math.random() * 5 + 10).toFixed(2)} Gbps`, 'danger');
                }, 400);
            }
        }

        function stopAttack() {
            clearInterval(attackInterval);
            clearInterval(logInterval);
            document.querySelectorAll('.btn-attack').forEach(b => b.classList.remove('active'));
            targetNode.classList.remove('under-attack');
            dnsNode.style.display = 'none';
            descText.innerHTML = "請選擇上方攻擊模式以啟動封包監聽與視覺化模擬。";
            
            if (currentMode) {
                addLog('Attack mitigated. Traffic normalizing.', 'info');
                currentMode = null;
            }
        }
    </script>
</body>
</html>
